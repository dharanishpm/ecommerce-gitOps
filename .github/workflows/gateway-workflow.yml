name: Build Gateway Service

on:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: ecommerce/gateway-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::394422659307:role/gitPushECR
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Gateway Application
        run: |
          cd gateway
          mvn clean package -DskipTests

      - name: Verify JAR
        run: |
          ls -la gateway/target

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ github.sha }} \
            ./gateway

      - name: Tag Docker Image
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ github.sha }}  \
            394422659307.dkr.ecr.eu-west-1.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }} 

      - name: Push Docker Image
        run: |
          docker push \
            394422659307.dkr.ecr.eu-west-1.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}